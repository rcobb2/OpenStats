# OpenLabStats Agent Configuration - macOS
# Used for development/testing on macOS.
# macOS exclude patterns are applied automatically (see config_darwin.go).

server:
  port: 9183
  metricsPath: /metrics
  reportURL: "https://openstats.tail9e516.ts.net"

monitor:
  reconcileInterval: 30s
  minLifetime: 2s
  building: ""
  room: ""
  # Leave excludePatterns empty to use macOS defaults from config_darwin.go.
  excludePatterns: []

normalizer:
  mappingFile: configs/software-map.json
  mappingUpdateURL: "https://openstats.tail9e516.ts.net/api/v1/mappings/agent"
  mappingRefreshInterval: 1h

inventory:
  scanInterval: 1h

store:
  dbPath: data/openlabstats.db

logging:
  level: debug
  filePath: logs/agent.log
