# OpenLabStats Server Configuration - Homelab deployment
server:
  port: 8080
  host: ""
  publicDir: public

database:
  host: openlabstats-postgres
  port: 5432
  user: openlabstats
  password: openlabstats
  dbName: openlabstats
  sslMode: disable

prometheus:
  url: http://prometheus:9090

grafana:
  url: http://grafana:3000

fileSD:
  outputPath: /etc/prometheus/file_sd/openlabstats.json
